# fancyss airport mapping hints
#
# 语法：
#   domain <订阅域名> <机场名>
#   clash_file_prefix <下载文件名前缀> <机场名>
#   clash_file_perfix <下载文件名前缀> <机场名>
#
# 说明：
# 1. 以 # 开头的是注释。
# 2. domain 规则优先级最高。
# 3. clash_file_prefix / clash_file_perfix 仅在 Clash 订阅且 domain 未命中时作为补充。
# 4. 如果节点本身没有 group，且映射也未命中，最后才回退到订阅域名。
#
# 示例：
domain sub.sslinks.co.in ssLinks
domain subbak.sslinks.co.in ssLinks
domain cdn.zenithgrid.co Nexitally
domain 161.129.35.81 AmyTelecom

clash_file_prefix Nexitally_Clash Nexitally
clash_file_prefix AmyTelecom_Clash AmyTelecom
